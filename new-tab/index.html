<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../icons/icon_gradient_128.png?v=3" type="image/png" />
    <title>New Tab</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500;700&display=swap" />
  </head>
  <body>
    <div id="app">
      <div id="header">
        <div class="apps-menu-container">
          <button id="apps-btn" class="icon-btn" title="Pinned">
            <span class="material-symbols-outlined">apps</span>
          </button>
          <!-- Apps Dropdown -->
          <div id="apps-dropdown" class="apps-dropdown">
            <div class="apps-dropdown-header">
              <!-- Dynamically rendered by JS: normal mode or edit mode -->
            </div>
            <div id="apps-grid" class="apps-grid">
              <!-- Apps injected by JavaScript -->
            </div>
          </div>
        </div>
        <div class="header-controls">
          <button id="theme-toggle-btn" class="theme-toggle-btn" title="">
            <span class="material-symbols-outlined">light_mode</span>
          </button>
          <button id="customize-btn" class="icon-btn" title="Customize greeting">
            <span class="material-symbols-outlined">settings</span>
          </button>
        </div>
      </div>
      <div id="app-main">
      <div id="hello-world"></div>
      <div id="date"></div>
      </div>
    </div>
    
    <!-- Settings Panel -->
    <div id="settings-panel" class="settings-panel">
      <div class="settings-header">
        <h2>Settings</h2>
        <button id="close-panel" class="icon-btn" title="Close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="settings-content">
        <div class="setting-item setting-column">
          <label for="greeting-input">Greeting</label>
          <input 
            type="text" 
            id="greeting-input" 
            placeholder="Enter your greeting..." 
            maxlength="50"
          />
        </div>

        <h3 id="day-tracker-heading" class="setting-section-heading">Day tracker</h3>
        <div
          class="setting-item setting-row-group"
          aria-labelledby="day-tracker-heading"
          aria-describedby="day-tracker-hint"
        >
          <div class="setting-subitem setting-column">
            <label for="start-day-input">Start day</label>
            <input type="number" id="start-day-input" min="1" max="9999" inputmode="numeric" />
          </div>
          <div class="setting-subitem setting-column">
            <label for="total-days-input">Total days</label>
            <input
              type="number"
              id="total-days-input"
              min="1"
              max="9999"
              inputmode="numeric"
            />
          </div>
        </div>
        <p id="day-tracker-hint" class="setting-hint" role="note">
          <span class="material-symbols-outlined setting-hint__icon" aria-hidden="true">info</span>
          <span class="setting-hint__text">Set the start day once. The tracker updates automatically every day.</span>
        </p>
        
        <button id="save-greeting" class="primary-btn">Save</button>
      </div>
      <div class="settings-footer">
        <a
          id="settings-github-link"
          class="settings-github-link"
          href="https://github.com/vishnueturi/chrome-newtab-extension"
          target="_blank"
          rel="noopener noreferrer"
          title="View repository on GitHub"
          aria-label="View this project on GitHub"
        >
          <!-- GitHub Invertocat (official mark), monochrome via currentColor -->
          <svg
            class="settings-github-icon"
            viewBox="0 0 98 96"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
            focusable="false"
          >
            <path
              fill="currentColor"
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.132-.08-9.201-13.196 2.86-16.001-5.6-16.001-5.6-2.16-5.5-5.28-6.97-5.28-6.97-4.32-2.95.33-2.89.33-2.89 4.77.33 7.28 4.9 7.28 4.9 4.24 7.28 11.12 5.18 13.84 3.98.42-3.1 1.65-5.18 3.01-6.37-10.52-1.19-21.59-5.26-21.59-23.44 0-5.18 1.85-9.42 4.9-12.75-.5-1.2-2.12-6.01.47-12.55 0 0 3.99-1.27 13.09 4.87a45.3 45.3 0 0 1 12-1.64c4.08 0 8.2.55 12 1.64 9.1-6.14 13.08-4.87 13.08-4.87 2.6 6.54.98 11.35.48 12.55 3.05 3.33 4.9 7.57 4.9 12.75 0 18.25-11.1 22.25-21.64 23.5 1.7 1.48 3.2 4.4 3.2 8.8 0 6.35-.08 11.48-.08 13.04 0 1.32.9 2.86 3.3 2.38A48.5 48.5 0 0 0 98 49.217C98 22 75.78 0 48.854 0z"
            />
          </svg>
        </a>
      </div>
    </div>
    
    <!-- Overlay -->
    <div id="overlay" class="overlay"></div>
    
    <script src="script.js"></script>
  </body>
</html>
